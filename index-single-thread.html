<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1" name="viewport"/>
    <link href="./favicon.svg" rel="icon" type="image/svg+xml"/>
    <title>SDF</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: #111;
            font-family: sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        nav {
            display: flex;
            gap: 12px;
            padding: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        nav a {
            color: #ddd;
            text-decoration: none;
            padding: 6px 10px;
            border: 1px solid #444;
            border-radius: 999px;
        }

        nav a.active {
            color: #111;
            background: #ddd;
            border-color: #ddd;
        }

        canvas {
            display: block;
            max-width: 100vw;
            max-height: calc(100vh - 80px);
            margin: auto 0;
        }

        canvas:focus,
        canvas:focus-visible {
            outline: none;
        }
    </style>
</head>
<body>
<nav id="scene-links"></nav>
<script type="module">
    import init, {available_scene_slugs_csv, start} from "./pkg/sdf.js";

    await init();

    const sceneSlugs = available_scene_slugs_csv().split(",").filter(Boolean);
    const params = new URLSearchParams(window.location.search);
    const requestedScene = params.get("scene");
    const activeScene = sceneSlugs.includes(requestedScene) ? requestedScene : sceneSlugs[0];
    const links = document.getElementById("scene-links");

    for (const slug of sceneSlugs) {
        const link = document.createElement("a");
        link.href = `?scene=${encodeURIComponent(slug)}`;
        link.textContent = slug;

        if (slug === activeScene) {
            link.classList.add("active");
        }

        links.appendChild(link);
    }

    start(activeScene);
</script>
</body>
</html>
