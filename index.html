<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1" name="viewport"/>
    <title>SDF</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: #111;
            font-family: sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        nav {
            display: flex;
            gap: 16px;
            padding: 16px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        #scene-links {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        nav a {
            color: #ddd;
            text-decoration: none;
            padding: 6px 10px;
            border: 1px solid #444;
            border-radius: 999px;
        }

        nav a.active {
            color: #111;
            background: #ddd;
            border-color: #ddd;
        }

        .github-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px;
            border-radius: 999px;
            line-height: 0;
        }

        .github-link svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        canvas {
            display: block;
            max-width: 100vw;
            max-height: calc(100vh - 80px);
            margin: auto 0;
        }

        canvas:focus,
        canvas:focus-visible {
            outline: none;
        }
    </style>
</head>
<body>
<nav>
    <div id="scene-links"></div>
    <a
        class="github-link"
        href="https://github.com/es-repo/sdf"
        target="_blank"
        rel="noreferrer"
        aria-label="View source on GitHub"
        title="View source on GitHub"
    >
        <svg viewBox="0 0 16 16" aria-hidden="true">
            <path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.5 7.5 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8 8 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/>
        </svg>
    </a>
</nav>
<script type="module">
    import init, {available_scene_slugs_csv, initThreadPool, start} from "./pkg/sdf.js";

    await init();
    if (!crossOriginIsolated) {
        throw new Error("SharedArrayBuffer is unavailable. Serve dist/ with COOP/COEP headers.");
    }

    await initThreadPool(Math.max(1, navigator.hardwareConcurrency || 1));

    const sceneSlugs = available_scene_slugs_csv().split(",").filter(Boolean);
    const params = new URLSearchParams(window.location.search);
    const requestedScene = params.get("scene");
    const activeScene = sceneSlugs.includes(requestedScene) ? requestedScene : sceneSlugs[0];
    const links = document.getElementById("scene-links");

    for (const slug of sceneSlugs) {
        const link = document.createElement("a");
        link.href = `?scene=${encodeURIComponent(slug)}`;
        link.textContent = slug;

        if (slug === activeScene) {
            link.classList.add("active");
        }

        links.appendChild(link);
    }

    start(activeScene);
</script>
</body>
</html>
