<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SDF</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #111;
      }

      body {
        display: grid;
        place-items: center;
      }

      canvas {
        display: block;
        max-width: 100vw;
        max-height: 100vh;
      }

      canvas:focus,
      canvas:focus-visible {
        outline: none;
      }
    </style>
  </head>
  <body>
    <script type="module">
      import init from "./pkg/sdf.js";

      init();
    </script>
  </body>
</html>
